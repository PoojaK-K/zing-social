{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Your Account • Zing Social</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #fafafa; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .verify-container { background-color: white; border: 1px solid #dbdbdb; padding: 40px; width: 350px; text-align: center; border-radius: 8px; box-sizing: border-box; }
        .icon-box { font-size: 50px; margin-bottom: 20px; color: #262626; }
        .title { font-size: 18px; font-weight: 600; margin-bottom: 15px; }
        .instruction { color: #8e8e8e; font-size: 14px; line-height: 18px; margin-bottom: 25px; }
        .email-display { color: #262626; font-weight: 600; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #dbdbdb; background: #fafafa; border-radius: 5px; font-size: 16px; text-align: center; letter-spacing: 5px; box-sizing: border-box; }
        .btn-verify { width: 100%; padding: 10px; background-color: #0095f6; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .resend-link { margin-top: 25px; font-size: 14px; color: #0095f6; cursor: pointer; text-decoration: none; font-weight: 600; display: block; }
    </style>
</head>
<body>
    <div class="verify-container">
        <div class="icon-box">✉️</div>
        <div class="title">Enter Confirmation Code</div>
        <div class="instruction">
            Enter the 6-digit code we sent to <br>
            <span class="email-display">{{ email }}</span>
        </div>

        <form method="POST" action="{% url 'verify_otp' %}">
            {% csrf_token %}
            <input type="hidden" name="email" value="{{ email }}">
            
            <input type="text" name="otp" placeholder="000000" maxlength="6" pattern="\d{6}" required autofocus>
            
            <button type="submit" class="btn-verify">Confirm</button>
        </form>

        <a href="{% url 'register' %}" class="resend-link">Change Email or Resend Code</a>
    </div>
</body>
</html>
