{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up • Zing Social</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #fafafa; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px 0; }
        .register-container { background-color: white; border: 1px solid #dbdbdb; padding: 40px; width: 350px; text-align: center; border-radius: 8px; box-sizing: border-box; }
        .logo { width: 175px; margin-bottom: 20px; }
        .sub-text { color: #8e8e8e; font-size: 17px; font-weight: 600; line-height: 20px; margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #dbdbdb; background: #fafafa; border-radius: 3px; font-size: 12px; box-sizing: border-box; }
        .btn-signup { width: 100%; padding: 10px; background-color: #0095f6; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 10px; transition: opacity 0.3s; }
        .btn-signup:disabled { opacity: 0.5; cursor: not-allowed; }
        .warning { color: #ed4956; font-size: 12px; margin-top: -5px; margin-bottom: 10px; display: none; text-align: left; width: 100%; }
        .login-box { background-color: white; border: 1px solid #dbdbdb; padding: 20px; width: 350px; text-align: center; margin-top: 10px; border-radius: 8px; font-size: 14px; box-sizing: border-box; }
        .login-link { color: #0095f6; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="register-container">
        <img src="{% static 'images/logo.png' %}" alt="Zing Social" class="logo">
        <div class="sub-text">Sign up to see photos and videos from your friends.</div>
        
        <form method="POST" id="registerForm">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Full Name" required>
            <input type="email" name="email" placeholder="Mobile Number or Email" required>
            <input type="password" id="pass1" name="password" placeholder="Password" required>
            <input type="password" id="pass2" name="confirm_password" placeholder="Confirm Password" required>
            
            <div id="passwordWarning" class="warning">Passwords do not match!</div>
            
            <button type="submit" id="submitBtn" class="btn-signup">Send OTP</button>
        </form>
    </div>

    <div class="login-box">
        Have an account? <a href="{% url 'login' %}" class="login-link">Log in</a>
    </div>

    <script>
        const pass1 = document.getElementById('pass1');
        const pass2 = document.getElementById('pass2');
        const warning = document.getElementById('passwordWarning');
        const submitBtn = document.getElementById('submitBtn');

        function validatePasswords() {
            if (pass2.value.length > 0 && pass1.value !== pass2.value) {
                warning.style.display = 'block';
                submitBtn.disabled = true;
            } else {
                warning.style.display = 'none';
                submitBtn.disabled = false;
            }
        }

        pass1.addEventListener('input', validatePasswords);
        pass2.addEventListener('input', validatePasswords);
    </script>
</body>
</html>
