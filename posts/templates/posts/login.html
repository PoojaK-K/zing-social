{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login • Zing Social</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #fafafa; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-container { background-color: white; border: 1px solid #dbdbdb; padding: 40px; width: 350px; text-align: center; border-radius: 8px; box-sizing: border-box; }
        .logo { width: 175px; margin-bottom: 30px; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #dbdbdb; background: #fafafa; border-radius: 3px; font-size: 12px; box-sizing: border-box; }
        input:focus { border: 1px solid #a8a8a8; outline: none; }
        .btn-login { width: 100%; padding: 10px; background-color: #0095f6; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        .btn-login:disabled { opacity: 0.7; cursor: not-allowed; }
        .divider { margin: 20px 0; display: flex; align-items: center; color: #8e8e8e; font-size: 13px; font-weight: 600; }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: #dbdbdb; margin: 0 10px; }
        .signup-box { background-color: white; border: 1px solid #dbdbdb; padding: 20px; width: 350px; text-align: center; margin-top: 10px; border-radius: 8px; font-size: 14px; box-sizing: border-box; }
        .signup-link { color: #0095f6; text-decoration: none; font-weight: 600; }
        .error-msg { color: #ed4956; font-size: 14px; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="login-container">
        <img src="{% static 'images/logo.png' %}" alt="Zing Social" class="logo">
        
        {% if messages %}
            {% for message in messages %}
                <div class="error-msg">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Phone number, username, or email" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit" class="btn-login">Log In</button>
        </form>

        <div class="divider">OR</div>
        <div style="color: #385185; font-size: 14px; font-weight: 600; cursor: pointer;">Log in with Facebook</div>
    </div>

    <div class="signup-box">
        Don't have an account? <a href="{% url 'register' %}" class="signup-link">Sign up</a>
    </div>
</body>
</html>
